<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Danpandora</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#f8f4ef;
font-family:'Montserrat',sans-serif;
color:#333;

}

header{

position:fixed;
top:0;
left:0;
width:100%;

padding:22px 8%;

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(248,244,239,.95);
backdrop-filter:blur(12px);

box-shadow:0 2px 12px rgba(0,0,0,.08);

z-index:999;

}

.logo{

font-family:'Cormorant Garamond',serif;

font-size:42px;

font-weight:700;

letter-spacing:3px;

color:#b89233;

}

nav{

display:flex;
gap:28px;

}

nav a{

text-decoration:none;

color:#333;

font-size:15px;

font-weight:500;

transition:.3s;

}

nav a:hover{

color:#c9a24d;

}

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:30px;

}

.hero h1{

font-family:'Cormorant Garamond',serif;

font-size:76px;

color:#b89233;

margin-bottom:20px;

}

.hero p{

font-size:20px;

max-width:700px;

line-height:1.8;

margin:auto;

margin-bottom:40px;

}

.boton{

display:inline-block;

padding:16px 42px;

border-radius:40px;

background:#d5b063;

color:white;

text-decoration:none;

font-weight:600;

transition:.35s;

}

.boton:hover{

background:#b89233;

transform:translateY(-4px);

}

footer{

background:#111;

color:white;

text-align:center;

padding:35px;

}

</style>

</head>

<body>

<header>

<div class="logo">

Danpandora

</div>

<nav>

<a href="#">Inicio</a>

<a href="#">Colecciones</a>

<a href="#">Colaboraciones</a>

<a href="#">Noticias</a>

<a href="#">Contacto</a>

</nav>

</header>

<section class="hero">

<div>

<h1>Elegancia Atemporal</h1>

<p>

Bienvenido a Danpandora.

Una marca ficticia creada con fines creativos e inspirada en el lujo, la elegancia y el diseño de joyería.

</p>

<a class="boton" href="#">

Descubrir colección

</a>

</div>

</section>

<footer>

© Danpandora · Proyecto ficticio

</footer>

</body>

</html>
