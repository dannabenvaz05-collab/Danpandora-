<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Danpandora</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Cormorant Garamond', serif;

}

body{

background:#f8f4ef;

color:#222;

}

header{

background:#efe4d6;

padding:20px 50px;

display:flex;

justify-content:space-between;

align-items:center;

position:sticky;

top:0;

box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.logo{

font-size:34px;

font-weight:bold;

color:#b88b2a;

letter-spacing:2px;

}

nav a{

margin-left:25px;

text-decoration:none;

color:#222;

font-weight:bold;

transition:.3s;

}

nav a:hover{

color:#d6a74b;

}

.hero{

height:90vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:30px;

background:linear-gradient(#f8f4ef,#ffffff);

}

.hero h1{

font-size:60px;

margin-bottom:20px;

}

.hero p{

font-size:22px;

margin-bottom:30px;

color:#555;

}

button{

background:#d6a74b;

color:white;

border:none;

padding:15px 35px;

border-radius:30px;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#b88b2a;

}

section{

padding:90px 12%;

}

h2{

font-size:40px;

color:#b88b2a;

margin-bottom:25px;

}

.card{

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

margin-top:20px;

}

footer{

background:#111;

color:white;

text-align:center;

padding:30px;

margin-top:80px;

}

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danpandora</title>

<style>

<body>

<header>

<div class="logo">
👑 DANPANDORA
</div>

<nav>

<a href="#inicio">Inicio</a>

<a href="#fundadora">Fundadora</a>

<a href="#colecciones">Colecciones</a>

<a href="#colaboraciones">Colaboraciones</a>

<a href="#noticias">Noticias</a>

<a href="#contacto">Contacto</a>

</nav>

</header>

<section class="hero" id="inicio">

<div>

<h1>Elegancia Atemporal</h1>

<p>

Bienvenido a Danpandora.

Un proyecto creativo de joyería de lujo.

</p>

<button>Descubrir Colección</button>

</div>

</section>

<section id="fundadora">

<h2>Sobre la fundadora</h2>

<div class="card">

<p>

Aquí pondremos tu historia, quién eres,

cómo nació Danpandora y cuál es tu visión.

</p>

</div>

</section>

<footer>

© Danpandora • Proyecto ficticio.

</footer>

</body>

</html
